[workspace]
authors = ["xuzhougeng <xuzhougeng@126.com>"]
channels = ["conda-forge", "bioconda"]
name = "reseq-project"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
fastp = ">=1.3.3,<2"
bwa = ">=0.7.18,<0.8"
samtools = ">=1.20,<2"
sambamba = ">=1.0.1,<2"

[feature.snakemake.dependencies]
snakemake = "*"

[environments]
snakemake = { features = ["snakemake"], no-default-feature = true }
