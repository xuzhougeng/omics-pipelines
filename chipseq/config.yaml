# ChIP-seq Snakemake pipeline configuration
# ==========================================

# Reference files
ref:
  bowtie2_index: "ref/human"
  gtf: "ref/gencode.v41.annotation.gtf"
  # Effective genome size for MACS3 (hs = human)
  macs_genome: "hs"

# fastp parameters
fastp:
  threads: 4
  length_required: 36
  qualified_quality_phred: 20
  unqualified_percent_limit: 40
  n_base_limit: 5
  detect_adapter_for_pe: true

# bowtie2 alignment parameters
bowtie2:
  threads: 32
  # --very-sensitive preset
  preset: "--very-sensitive"
  # ChIP fragments are usually < 1 kb
  max_fragment_length: 1000

# samtools sort threads
samtools_sort:
  threads: 8

# sambamba markdup parameters
sambamba:
  threads: 16
  overflow_list_size: 600000
  hash_table_size: 525000

# BAM filtering parameters
filter_bam:
  mapq_threshold: 10
  nuclear_chroms:
    - chr1
    - chr2
    - chr3
    - chr4
    - chr5
    - chr6
    - chr7
    - chr8
    - chr9
    - chr10
    - chr11
    - chr12
    - chr13
    - chr14
    - chr15
    - chr16
    - chr17
    - chr18
    - chr19
    - chr20
    - chr21
    - chr22
    - chrX
    - chrY

# Per-sample coverage bigwig (deeptools bamCoverage)
bigwig:
  bin_size: 10
  normalize_using: "CPM"

# IP-vs-input ratio bigwig (deeptools bamCompare)
bigwig_compare:
  bin_size: 50
  # log2 of the (normalized) IP/input ratio
  operation: "log2"

# MACS3 peak calling parameters
# Peaks are called per IP sample with its matched input as control (-c).
# For broad marks (e.g. H3K27me3, H3K36me3) you would add `--broad` and switch
# the output to *.broadPeak; the default here is narrow peaks (TFs, H3K4me3...).
macs3:
  format: "BAMPE"
  qvalue: 0.05
  # duplicates were already removed in the filter step
  keep_dup: "all"

# featureCounts parameters
featurecounts:
  threads: 8
  min_overlap: 1

# ChIPseeker parameters
chipseeker:
  tss_region: [-3000, 3000]
  # Organism + annotation DB used for peak annotation.
  # To switch organism, change these AND add the matching annotation
  # package to pixi.toml (e.g. org.Mm.eg.db for mouse).
  organism: "Homo sapiens"
  anno_db: "org.Hs.eg.db"

# Threads for fastqc
fastqc:
  threads: 4
