[workspace]
authors = ["xuzhougeng <xuzhougeng@126.com>"]
channels = ["conda-forge", "bioconda"]
name = "chipseq-project"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
fastqc = ">=0.12.1,<0.13"
fastp = ">=1.3.3,<2"
python = ">=3.14.4,<3.15"
bowtie2 = ">=2.5.5,<3"
sambamba = ">=1.0.1,<2"
pysam = ">=0.24.0,<0.25"
pandas = ">=3.0.2,<4"

[feature.deeptools.dependencies]
python = ">=3.10,<3.11"
deeptools = ">=3.5,<3.6"
samtools = ">=1.20,<2"
bedtools = ">=2.31,<3"

[feature.macs3.dependencies]
macs3 = ">=3.0.0"

[feature.peakquant.dependencies]
bedtools = ">=2.31,<3"
subread = ">=2.0,<3"
bioconductor-deseq2 = ">=1.50.2,<2"

[feature.chipseeker.dependencies]
bioconductor-chipseeker = "*"
# Annotation DB for the default organism (config: chipseeker.anno_db).
# For another organism, swap this for the matching package, e.g. org.Mm.eg.db.
"bioconductor-org.hs.eg.db" = "*"
bioconductor-txdbmaker = ">=1.6.2,<2"

[feature.snakemake.dependencies]
snakemake = "*"

[environments]
deeptools = { features = ["deeptools"], no-default-feature = true }
macs3 = { features = ["macs3"], no-default-feature = true }
chipseeker = { features = ["chipseeker"], no-default-feature = true }
peak-quant = { features = ["peakquant"], no-default-feature = true }
snakemake = { features = ["snakemake"], no-default-feature = true }
