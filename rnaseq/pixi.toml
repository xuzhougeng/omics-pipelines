[workspace]
authors = ["xuzhougeng <xuzhougeng@126.com>"]
channels = ["conda-forge", "bioconda"]
name = "rnaseq-project"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
fastqc = ">=0.12.1,<0.13"
fastp = ">=1.3.3,<2"
python = ">=3.12,<3.13"
pandas = ">=2.0"

[feature.star.dependencies]
star = ">=2.7,<3"
samtools = ">=1.20,<2"

[feature.megadepth.dependencies]
megadepth = ">=1.2.0"

[feature.deseq2.dependencies]
bioconductor-deseq2 = ">=1.40"
r-base = ">=4.3"

[feature.snakemake.dependencies]
snakemake = "*"

[environments]
star = { features = ["star"], no-default-feature = true }
megadepth = { features = ["megadepth"], no-default-feature = true }
deseq2 = { features = ["deseq2"], no-default-feature = true }
snakemake = { features = ["snakemake"], no-default-feature = true }
